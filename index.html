<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cricket Picnic 2026 – Family Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at top left, #ff4b6b 0, #050816 45%, #0c1631 100%);
      color: #ffffff;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    /* Right side: picnic illustration */
    .bg-wrapper {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      border-radius: 24px 0 0 24px;
    }

    .bg-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      filter: brightness(0.96);
    }

    /* Left side: form */
    .container {
      flex: 0 0 420px;
      max-width: 100%;
      background: rgba(5, 8, 22, 0.9);
      border-radius: 0 24px 24px 0;
      padding: 24px 24px 28px;
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px #22c55e;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      display: block;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.75);
      color: #e5e7eb;
      font-size: 14px;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.6);
      background: rgba(15, 23, 42, 0.95);
    }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .row-inline {
      display: flex;
      gap: 12px;
    }

    .row-inline > div {
      flex: 1 1 0;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ef4444, #3b82f6);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow:
        0 12px 25px rgba(0, 0, 0, 0.7),
        0 0 18px rgba(239, 68, 68, 0.7);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    button[type="submit"]:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button[type="submit"]:active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        0 8px 16px rgba(0, 0, 0, 0.8),
        0 0 10px rgba(59, 130, 246, 0.6);
    }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    .status.success {
      color: #4ade80;
    }

    .status.error {
      color: #f97373;
    }

    .status.info {
      color: #fde68a;
    }

    @media (max-width: 768px) {
      .page {
        flex-direction: column;
      }

      .bg-wrapper {
        order: 1;
        height: 260px;
        border-radius: 0 0 24px 24px;
      }

      .container {
        order: 2;
        border-radius: 0;
        padding: 18px 16px 22px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Image side: boys playing cricket, kids & families in park -->
    <div class="bg-wrapper">
      <!-- Make sure this filename exactly matches the PNG in your repo -->
      <img src="PicnicCricket2026.png" alt="Cricket Picnic 2026 Background" />
    </div>

    <!-- Form side -->
    <div class="container">
      <div class="badge">
        <div class="badge-dot"></div>
        <span>Cricket Family Picnic 2026</span>
      </div>

      <h1>Family Registration & Food Plan</h1>
      <p class="subtitle">
        Tell us who is joining the picnic so we can plan well.
      </p>

      <form id="picnic-form">
        <div>
          <label for="name">Primary Contact Name *</label>
          <input id="name" name="name" type="text" required placeholder="Your full name" />
        </div>

        <div class="row-inline">
          <div>
            <label for="adults">Adults Attending</label>
            <input id="adults" name="adults" type="number" min="0" placeholder="e.g. 2" />
          </div>
          <div>
            <label for="kids">Kids Attending</label>
            <input id="kids" name="kids" type="number" min="0" placeholder="e.g. 2" />
          </div>
        </div>

        <div class="row-inline">
          <div>
            <label for="vegetarians">Vegetarians</label>
            <input id="vegetarians" name="vegetarians" type="number" min="0" placeholder="e.g. 2" />
          </div>
          <div>
            <label for="nonVegetarians">Non‑Vegetarians</label>
            <input id="nonVegetarians" name="nonVegetarians" type="number" min="0" placeholder="e.g. 2" />
          </div>
        </div>

        <p class="hint">
          If you leave any number blank, we will treat it as zero. Vegetarian + non‑vegetarian ideally matches total adults + kids.
        </p>

        <button type="submit">Submit Registration</button>

        <div id="status" class="status"></div>

        <p class="footer">
          Registration details are stored securely.
        </p>
      </form>
    </div>
  </div>

  <script>
    const scriptURL = 'YOUR_SCRIPT_URL_HERE';  // paste your Apps Script Web App URL
    const form = document.getElementById('picnic-form');
    const statusDiv = document.getElementById('status');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      statusDiv.textContent = '';
      statusDiv.className = 'status';

      // Treat blanks as 0 and always proceed
      const adults = Number(document.getElementById('adults').value || 0);
      const kids = Number(document.getElementById('kids').value || 0);
      const vegetarians = Number(document.getElementById('vegetarians').value || 0);
      const nonVegetarians = Number(document.getElementById('nonVegetarians').value || 0);

      const totalPeople = adults + kids;
      const totalFoodPeople = vegetarians + nonVegetarians;

      if (totalPeople <= 0) {
        statusDiv.textContent =
          'Note: total attendees is zero; we will still record your response in the sheet.';
        statusDiv.className = 'status info';
      } else if (totalFoodPeople !== totalPeople) {
        statusDiv.textContent =
          'Note: Vegetarian + non‑vegetarian counts do not match total adults + kids; we will still record your response.';
        statusDiv.className = 'status info';
      } else {
        statusDiv.textContent = 'Submitting...';
        statusDiv.className = 'status';
      }

      const formData = new FormData(form);

      fetch(scriptURL, {
        method: 'POST',
        body: formData
      })
        .then(response => response.json())
        .then(data => {
          if (data.result === 'success') {
            statusDiv.textContent = 'Thank you! Your family details have been recorded.';
            statusDiv.className = 'status success';
            form.reset();
          } else {
            statusDiv.textContent = 'Something went wrong. Please try again.';
            statusDiv.className = 'status error';
          }
        })
        .catch(error => {
          console.error('Error!', error);
          statusDiv.textContent = 'Network error. Please try again.';
          statusDiv.className = 'status error';
        });
    });
  </script>
</body>
</html>
